name: AQARION v15.1 CI (Invariant Enforcement)

on:
  push:
  pull_request:

jobs:
  invariant-test-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest

      # -----------------------------
      # STAGE 2 — STRUCTURAL TESTS
      # -----------------------------
      - name: Run Structural Tests (A-group)
        run: |
          python -m pytest verification/test_structural.py -v

      # -----------------------------
      # STAGE 3 — DYNAMICS TESTS
      # -----------------------------
      - name: Run Dynamical Tests (B-group)
        run: |
          python -m pytest verification/test_dynamics.py -v

      # -----------------------------
      # STAGE 4 — GRAPH CONSISTENCY
      # -----------------------------
      - name: Run Graph Tests (C-group)
        run: |
          python -m pytest verification/test_graph.py -v

      # -----------------------------
      # STAGE 5 — OBSTRUCTION THEORY
      # -----------------------------
      - name: Run Obstruction Tests (D-group)
        run: |
          python -m pytest verification/test_obstruction.py -v

      # -----------------------------
      # STAGE 6 — SPECTRAL VALIDATION
      # -----------------------------
      - name: Run Spectral Tests (E-group)
        run: |
          python -m pytest verification/test_spectral.py -v

      # -----------------------------
      # STAGE 7 — RANDOM STRESS SUITE
      # -----------------------------
      - name: Run Stress Tests (G-group)
        run: |
          python -m pytest verification/test_stress.py -v --maxfail=1

      # -----------------------------
      # STAGE 8 — EVIDENCE CHECK
      # -----------------------------
      - name: Validate Evidence Emission
        run: |
          python -c "from evidence.emitter import emit; print('EVIDENCE OK')"

      # -----------------------------
      # FINAL GATE
      # -----------------------------
      - name: Final Invariant Gate
        run: |
          python run_all.py

      - name: Deploy to Hugging Face Space (on main branch only)
  if: github.ref == 'refs/heads/main' && success()
  run: |
    git clone https://huggingface.co/spaces/Quantarion9/Quantarion-FDS
    cp -r verification/evidence/* Quantarion-FDS/evidence/
    cd Quantarion-FDS
    git add .
    git commit -m "Auto-deploy v19.0 Evidence $(date -I)"
    git push
